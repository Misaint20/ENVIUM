name: Publish to npm

on:
  push:
    branches:
      - main # Se dispara cada vez que hagas push a la rama principal

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        # Si los tests fallan, el workflow se detiene aquí y no publica nada (Seguridad SOLID)

      - name: Build package
        run: npm run build

      - name: Authenticate and Publish
        run: |
          npm config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}